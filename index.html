<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', 'Arial', sans-serif;
  background: #F7F4EF;
  color: #2D2A28;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
}

main {
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0;
}

a { text-decoration: none; color: inherit; }

/* ── Painel do monograma ── */

.panel-frame {
  width: 100%;
  aspect-ratio: 1.6 / 1;
  padding: 6px;
  border: 0.5px solid rgba(176, 122, 90, 0.22);
}

.panel {
  width: 100%;
  height: 100%;
  background: #2D2A28;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: visible;
}

.panel svg {
  width: 62%;
  height: auto;
  overflow: visible;
}

/* ── Identidade ── */

.divider {
  width: 60px;
  height: 1px;
  background: #E9DDD1;
  margin: 28px 0;
}

.name {
  font-family: 'Cormorant Garamond', 'Georgia', serif;
  font-size: 22px;
  font-weight: 400;
  letter-spacing: 0.14em;
  color: #2D2A28;
  text-transform: uppercase;
  text-align: center;
  line-height: 1.5;
}

.oab {
  font-size: 11px;
  font-weight: 300;
  letter-spacing: 0.24em;
  color: #B07A5A;
  text-transform: uppercase;
  margin-top: 10px;
  text-align: center;
}

.areas {
  font-size: 10px;
  font-weight: 300;
  letter-spacing: 0.12em;
  color: #B07A5A;
  text-transform: uppercase;
  margin-top: 8px;
  text-align: center;
  opacity: 0.7;
}

/* ── Botões ── */

.actions {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 14px;
  width: 100%;
  padding: 16px 24px 16px 28px;
  background: #2D2A28;
  border: none;
  cursor: pointer;
  color: #E9DDD1;
  font-family: 'Montserrat', 'Arial', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  -webkit-tap-highlight-color: transparent;
}

.btn:active {
  opacity: 0.85;
}

.btn svg {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
}

.footer {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 32px;
  opacity: 0.35;
}

.footer svg {
  width: 14px;
  height: 14px;
}

.footer span {
  font-size: 9px;
  font-weight: 300;
  letter-spacing: 0.06em;
  color: #2D2A28;
}
